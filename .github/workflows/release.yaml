name: "Release"

on:
  workflow_dispatch:
    inputs:
      tags:
        description: "Extra Tags: comma,separated"
        required: false
      fail:
        description: "Fail Job"
        required: false
        type: boolean
        default: false
  release:
    types: [published]

jobs:
  release:
    name: "Release"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Debug event.json"
        continue-on-error: true
        run: cat "${GITHUB_EVENT_PATH}"
      - name: "Debug CTX github"
        continue-on-error: true
        env:
          GITHUB_CTX: ${{ toJSON(github) }}
        run: echo "$GITHUB_CTX"
      - name: "Debug Environment"
        continue-on-error: true
        run: env

      - name: "Debug"
        if: ${{ !github.event.act }}
        continue-on-error: true
        run: |
          echo github.event_name: ${{ github.event_name }}
          echo github.ref_name: ${{ github.ref_name }}
          echo inputs.tags: ${{ inputs.tags }}

      #- name: "Update Release Notes"
      #  env:
      #    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #  run: |
      #    echo tags: ${{ steps.tags.outputs.tags }}
      #
      #    body=$(gh release view --json body --jq '.body')
      #    echo "body:"
      #    echo "${body}"
      #
      #    if [[ body == *"----"* ]];then
      #      head=$(echo "${body}" | awk "/----/{exit} {print}")
      #      tail=$(echo "${body}" | sed -n '/----/,$p')
      #    else
      #      head=""
      #      tail="${body}"
      #    fi
      #
      #    echo "head:"
      #    echo "${head}"
      #
      #    echo "tail:"
      #    echo "${tail}"

      - name: Retard 1
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          echo "${RELEASE_BODY}" > release_body.txt

      - name: Retard 2
        id: release_notes
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          PRE_HEADING=$(echo "${RELEASE_BODY}" | sed '/^#/Q')
          echo "pre_heading<<EOF" >> $GITHUB_OUTPUT
          echo "$PRE_HEADING" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Retard 3
        run: echo "${{ steps.release_notes.outputs.pre_heading }}"

      - name: "Get release body"
        continue-on-error: true
        id: notes
        run: |
          body="$(jq -r .release.body "$GITHUB_EVENT_PATH")"
          summary="$(printf '%s\n' "$body" | awk 'NF==0{exit} /^\-/')"
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$summary" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: "Use summary"
        run: echo "${{ steps.notes.outputs.summary }}"

      - name: "Generate Whats New"
        if: ${{ github.event_name == 'release' }}
        env:
          SUMMARY: ${{ steps.notes.outputs.summary != '' && steps.notes.outputs.summary || 'GitHub Actions' }}
        run: |
          echo "${{ env.SUMMARY }}"
          mkdir -p whatsNew
          echo "${{ steps.notes.outputs.summary }}" > whatsNew/whatsnew-en-US
          cat whatsNew/whatsnew-en-US

      - name: "Fail"
        if: ${{ inputs.fail }}
        run: |
          exit 1

  build:
    name: "Build"
    if: ${{ !contains(github.event.head_commit.message, '#nodev') }}
    uses: ./.github/workflows/build.yaml
    needs: release
    permissions:
      contents: write
      packages: write
    #with:
    #  tags: ${{ needs.release.outputs.tags }}
    secrets: inherit
