name: "Push"

on:
  workflow_dispatch:
    inputs:
      fail:
        description: "Fail Job"
        type: boolean
        default: false
      version:
        description: "Version Tag"
        type: string
  push:
    branches: ["**"]

env:
  version: ${{ github.event.workflow_run.head_branch || github.ref_name }}

jobs:
  push:
    name: "Push"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v5

      - name: "Debug event.json"
        continue-on-error: true
        run: |
          cat "${GITHUB_EVENT_PATH}"

      - name: "Dump object"
        continue-on-error: true
        env:
          GITHUB_CTX: ${{ toJSON(github) }}
        run: echo "$GITHUB_CTX"

      - name: "Debug"
        continue-on-error: true
        run: |
          echo github.repository: ${{ github.repository }}
          echo github.event_name: ${{ github.event_name }}
          echo github.ref_name: ${{ github.ref_name  }}
          echo inputs.fail: ${{ inputs.fail }}
          echo inputs.fail: ${{ inputs.fail }}
          echo inputs.version: ${{ inputs.version }}
          echo env.version: ${{ env.version }}

      # BEGIN CUSTOM

      - name: "Setup Python 3.13"
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: "Install"
        id: install
        run: |
          python -m pip install -U pip zensical

      - name: "Fake Build"
        id: build
        run: |
          zensical --version
          echo "version=$(zensical --version)" >> "$GITHUB_OUTPUT"

      #- name: "Debug 1"
      #  if: ${{ always() }}
      #  continue-on-error: true
      #  run: |
      #    zensical --version

      - name: "Summary"
        if: ${{ always() }}
        env:
          version: ${{ steps.build.outputs.version }}
        run: |
          if [ "${{ steps.build.outcome }}" == "success" ];then
            markdown="🚀 Build Success\n\n"
            markdown+="zensical version: \`${version}\`\n\n"
          else
            markdown="⛔ Build Failure\n\n"
          fi
          markdown+="<details><summary>Build Contents</summary>\n\n\`\`\`text\n"
          markdown+="$(tree .)"
          markdown+="\`\`\`\n\n</details>\n\n"
          echo -e "${markdown}" >> $GITHUB_STEP_SUMMARY

      # END CUSTOM

      ## Optioanl Fail Job for Debugging
      - name: "Fail"
        if: ${{ inputs.fail }}
        run: |
          exit 1
