name: "Push"

on:
  workflow_dispatch:
    inputs:
      fail:
        description: "Fail Job"
        type: boolean
        default: false
      version:
        description: "Zensical Version"
      python-version:
        description: "Python Version"
      uv-version:
        description: "UV Version"
  push:
    branches: ["**"]

env:
  version: ${{ github.event.workflow_run.head_branch || github.ref_name }}

jobs:
  push:
    name: "Push"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v5

      - name: "Debug event.json"
        continue-on-error: true
        run: cat "${GITHUB_EVENT_PATH}"

      - name: "Debug CTX github"
        continue-on-error: true
        env:
          GITHUB_CTX: ${{ toJSON(github) }}
        run: echo "$GITHUB_CTX"

      - name: "Debug Environment"
        continue-on-error: true
        run: env

      - name: "Debug"
        continue-on-error: true
        run: |
          echo github.repository: ${{ github.repository }}
          echo github.event_name: ${{ github.event_name }}
          echo github.ref_name: ${{ github.ref_name  }}
          echo inputs.fail: ${{ inputs.fail }}
          echo inputs.fail: ${{ inputs.fail }}
          echo inputs.version: ${{ inputs.version }}
          echo env.version: ${{ env.version }}

      # BEGIN CUSTOM

      - name: "Install UV"
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ inputs.uv-version }}
          python-version: ${{ inputs.python-version }}

      #- name: "Install Python"
      #  continue-on-error: true
      #  run: |
      #    uv python install --default
      #    echo "::group::uv python list"
      #    uv python list
      #    echo "::endgroup::"
      #    echo "::group::uv python list jq"
      #    uv python list --only-installed --output-format json | jq
      #    echo "::endgroup::"

      - name: "Setup UV"
        continue-on-error: true
        run: |
          uv venv "${{ runner.temp }}/.venv"
          echo "--- debug 1 ---"

      - name: "Debug UV"
        continue-on-error: true
        run: |
          source "${{ runner.temp }}/.venv/bin/activate"
          echo "--- debug 1 ---"
          uv python dir
          uv python dir --bin
          echo "::group::uv python list"
          uv python list
          echo "::endgroup::"
          echo "::group::uv python list jq"
          uv python list --only-installed --output-format json | jq
          echo "::endgroup::"

      - name: "Test 1"
        continue-on-error: true
        run: |
          #path="$(uv python list --only-installed --output-format json | jq '.[0].path')"
          #path="/home/runner/.local/share/uv/python/cpython-3.14.1-linux-x86_64-gnu/bin"
          #echo "path: ${path}"
          #ls -lah "${path}"
          source "${{ runner.temp }}/.venv/bin/activate"
          echo "--- debug 1 ---"
          echo "--- debug 2 ---"
          echo "--- debug 2 ---"
          echo "--- debug 3 ---"
          uv pip install zensical
          echo "--- debug 4 ---"
          uv run zensical --version
          echo "--- debug 5 ---"

      #- name: "Debug 1"
      #  continue-on-error: true
      #  run: |
      #    ls -lAh /home/runner/.local/share/uv
      #    echo '----------'
      #    ls -lAh /home/runner/.local/share/uv/python

      #- name: "Debug 2"
      #  continue-on-error: true
      #  run: |
      #    echo "::group::uv pip list"
      #    uv pip list
      #    echo "::endgroup::"
      #    echo "::group::tree"
      #    tree .
      #    echo "::endgroup::"

      # END CUSTOM

      ## Optioanl Fail Job for Debugging
      - name: "Fail"
        if: ${{ inputs.fail }}
        run: |
          exit 1
