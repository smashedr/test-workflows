name: "Push"

on:
  workflow_dispatch:
    inputs:
      fail:
        description: "Fail Job"
        type: boolean
        default: false
      version:
        description: "Version Tag"
        type: string
  push:
    branches: ["**"]

env:
  version: ${{ github.event.workflow_run.head_branch || github.ref_name }}

jobs:
  push:
    name: "Push"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    env:
      repo: "smashedr/test4"
      version: "1.0.0"
      formula: "npmstat.rb"

    steps:
      - name: "Checkout"
        uses: actions/checkout@v5

      - name: "Debug event.json"
        continue-on-error: true
        run: cat "${GITHUB_EVENT_PATH}"

      - name: "Debug CTX github"
        continue-on-error: true
        env:
          GITHUB_CTX: ${{ toJSON(github) }}
        run: echo "$GITHUB_CTX"

      - name: "Debug Environment"
        continue-on-error: true
        run: env

      - name: "Debug"
        continue-on-error: true
        run: |
          echo github.repository: ${{ github.repository }}
          echo github.event_name: ${{ github.event_name }}
          echo github.ref_name: ${{ github.ref_name  }}
          echo inputs.fail: ${{ inputs.fail }}
          echo inputs.fail: ${{ inputs.fail }}
          echo inputs.version: ${{ inputs.version }}
          echo env.version: ${{ env.version }}

      # BEGIN CUSTOM

      - name: "Checkout Homebrew"
        uses: actions/checkout@v6
        with:
          repository: ${{ env.repo }}
          ref: master
          path: homebrew

      - name: "Debug 1"
        continue-on-error: true
        run: |
          cat homebrew/Formula/${{ env.formula }}

      - name: "Update Formula"
        shell: bash
        run: |
          line=$(grep -ni -m1 version homebrew/Formula/${{ env.formula }} | cut -f1 -d:)
          echo "line: ${line}"
          sed -i "${line}"'s/.*/  version "${{ env.version }}"/' homebrew/Formula/${{ env.formula }}

      - name: "Debug 2"
        continue-on-error: true
        run: |
          cat homebrew/Formula/${{ env.formula }}

      - name: "Debug 3"
        continue-on-error: true
        working-directory: homebrew
        run: |
          pwd
          git status

      - name: "Commit File"
        working-directory: homebrew
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -a -m "Bump ${{ env.formula }} to ${{ env.version }}"
          git push -u origin master "https://${{ secrets.HOMEBREW_PAT }}@github.com/${{ env.repo }}.git"

      #- name: "Push changes"
      #  if: ${{ env.repo }}
      #  uses: ad-m/github-push-action@master
      #  with:
      #    github_token: ${{ secrets.HOMEBREW_PAT }}
      #    repository: ${{ env.repo }}
      #    branch: master

      # END CUSTOM

      ## Optioanl Fail Job for Debugging
      - name: "Fail"
        if: ${{ inputs.fail }}
        run: |
          exit 1
