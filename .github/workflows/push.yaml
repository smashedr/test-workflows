          payload=$(jq -cn \
            --arg text "$output" \
            '{
              model: "gpt-4.1-mini-2025-04-14",
              instructions: "Translate the text to language: Spanish (Mexico)",
              input: $text
            }')
          echo "payload=$payload" >> "$GITHUB_OUTPUT"

      - name: "Debug 2"
        continue-on-error: true
