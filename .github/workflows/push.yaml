name: "Push"

on:
  workflow_dispatch:
    inputs:
      fail:
        description: "Fail Job"
        type: boolean
        default: false
      version:
        description: "Version Tag"
        type: string
  push:
    branches: ["**"]

env:
  version: ${{ github.event.workflow_run.head_branch || github.ref_name }}

jobs:
  push:
    name: "Push"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    env:
      version: "1.0.0"
      formula: "npmstat"

    steps:
      - name: "Checkout"
        uses: actions/checkout@v5

      - name: "Debug event.json"
        continue-on-error: true
        run: cat "${GITHUB_EVENT_PATH}"

      - name: "Debug CTX github"
        continue-on-error: true
        env:
          GITHUB_CTX: ${{ toJSON(github) }}
        run: echo "$GITHUB_CTX"

      - name: "Debug Environment"
        continue-on-error: true
        run: env

      - name: "Debug"
        continue-on-error: true
        run: |
          echo github.repository: ${{ github.repository }}
          echo github.event_name: ${{ github.event_name }}
          echo github.ref_name: ${{ github.ref_name  }}
          echo inputs.fail: ${{ inputs.fail }}
          echo inputs.fail: ${{ inputs.fail }}
          echo inputs.version: ${{ inputs.version }}
          echo env.version: ${{ env.version }}

      # BEGIN CUSTOM

      - name: "Checkout Homebrew"
        uses: actions/checkout@v6
        with:
          #repository: smashedr/homebrew-test
          repository: smashedr/test4
          ref: master
          path: homebrew

      - name: "Control"
        continue-on-error: true
        run: |
          cat homebrew/Formula/${{ env.formula }}.rb

      - name: "Update Formula"
        shell: bash
        run: |
          sed -i "/version/{N; s/.*\n/  version: \"${{ env.version }}\"\n/;}" homebrew/Formula/${{ env.formula }}.rb

      - name: "Cat File"
        continue-on-error: true
        run: |
          cat homebrew/Formula/${{ env.formula }}.rb

      - name: "Commit File"
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -a -m "Bump ${{ env.formula }} to ${{ env.version }}"

      #- name: "Push changes"
      #  uses: ad-m/github-push-action@master
      #  with:
      #    github_token: ${{ secrets.GITHUB_TOKEN }}
      #    branch: master

      # END CUSTOM

      ## Optioanl Fail Job for Debugging
      - name: "Fail"
        if: ${{ inputs.fail }}
        run: |
          exit 1
