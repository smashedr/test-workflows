name: "Push"

on:
  workflow_dispatch:
    inputs:
      fail:
        description: "Fail Job"
        type: boolean
        default: false
      version:
        description: "Zensical Version"
      python-version:
        description: "Python Version"
      uv-version:
        description: "UV Version"
  push:
    branches: ["**"]

env:
  version: ${{ github.event.workflow_run.head_branch || github.ref_name }}

jobs:
  push:
    name: "Push"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v5

      - name: "Debug event.json"
        continue-on-error: true
        run: cat "${GITHUB_EVENT_PATH}"

      - name: "Debug CTX github"
        continue-on-error: true
        env:
          GITHUB_CTX: ${{ toJSON(github) }}
        run: echo "$GITHUB_CTX"

      - name: "Debug Environment"
        continue-on-error: true
        run: env

      - name: "Debug"
        continue-on-error: true
        run: |
          echo github.repository: ${{ github.repository }}
          echo github.event_name: ${{ github.event_name }}
          echo github.ref_name: ${{ github.ref_name  }}
          echo inputs.fail: ${{ inputs.fail }}
          echo inputs.fail: ${{ inputs.fail }}
          echo inputs.version: ${{ inputs.version }}
          echo env.version: ${{ env.version }}

      # BEGIN CUSTOM

      - name: "Install UV"
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ inputs.uv-version }}
          python-version: ${{ inputs.python-version }}

      - name: "Test 1"
        continue-on-error: true
        run: |
          uv python install --default
          echo "::group::uv python list"
          uv python list
          echo "::endgroup::"
          echo "--- debug 1 ---"
          uv python dir --bin
          echo "--- debug 2 ---"
          uv python dir
          echo "--- debug 2 ---"
          uv python dir --bin
          echo "--- debug 3 ---"
          uv pip install --python "$(uv python dir --bin)" zensical
          echo "--- debug 4 ---"
          uv run zensical --version
          echo "--- debug 5 ---"

      - name: "Debug 1"
        continue-on-error: true
        run: |
          ls -lAh /home/runner/.local/share/uv
          echo '----------'
          ls -lAh /home/runner/.local/share/uv/python

      - name: "Debug 2"
        continue-on-error: true
        run: |
          echo "::group::uv pip list"
          uv pip list
          echo "::endgroup::"
          echo "::group::tree"
          tree .
          echo "::endgroup::"

      # END CUSTOM

      ## Optioanl Fail Job for Debugging
      - name: "Fail"
        if: ${{ inputs.fail }}
        run: |
          exit 1
