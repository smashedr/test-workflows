name: "Push"

on:
  workflow_dispatch:
    inputs:
      fail:
        description: "Fail Job"
        type: boolean
        default: false
      version:
        description: "Version Tag"
        type: string
  push:
    branches: ["**"]

env:
  version: ${{ github.event.workflow_run.head_branch || github.ref_name }}

defaults:
  run:
    shell: bash

jobs:
  push:
    name: "Push"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Debug event.json"
        continue-on-error: true
        run: cat "${GITHUB_EVENT_PATH}"
      - name: "Debug CTX github"
        continue-on-error: true
        env:
          GITHUB_CTX: ${{ toJSON(github) }}
        run: echo "$GITHUB_CTX"
      - name: "Debug Environment"
        continue-on-error: true
        run: env

      - name: "Debug"
        continue-on-error: true
        run: |
          echo github.repository: ${{ github.repository }}
          echo github.event_name: ${{ github.event_name }}
          echo github.ref_name: ${{ github.ref_name  }}
          echo inputs.fail: ${{ inputs.fail }}
          echo inputs.fail: ${{ inputs.fail }}
          echo inputs.version: ${{ inputs.version }}
          echo env.version: ${{ env.version }}

      # BEGIN CUSTOM

      - name: "Generate Release Notes"
        continue-on-error: true
        id: summary1
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          #text=$(echo "${RELEASE_BODY}" | sed '/^#/Q')
          text="$(cat temp.md)"
          echo "text<<EOF" >> $GITHUB_OUTPUT
          echo "$text" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: "Debug 1"
        continue-on-error: true
        env:
          OUTPUT: ${{ steps.summary1.outputs.text }}
        run: |
          echo "${OUTPUT}"

      - name: "Test 1"
        continue-on-error: true
        env:
          OUTPUT: ${{ steps.summary1.outputs.text }}
        run: |
          echo '{
            "model": "gpt-4.1-mini-2025-04-14",
            "instructions": "Translate the text to language: Spanish (Mexico)",
            "input": "${OUTPUT}"
          }' | jq -c

      #- name: "Test 2"
      #  continue-on-error: true
      #  env:
      #    OUTPUT: ${{ steps.summary1.outputs.text }}
      #  run: |
      #    echo "${OUTPUT}"
      #    cat > amo-metadata.json << EOF
      #    {
      #      "model": "gpt-4.1-mini-2025-04-14",
      #      "instructions": "Translate the text to language: Spanish (Mexico)",
      #      "input": "${OUTPUT}"
      #    }
      #    EOF

      #- name: "Open API Call"
      #  env:
      #    OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      #    OUTPUT: ${{ steps.summary1.outputs.text }}
      #  run: |
      #    curl https://api.openai.com/v1/responses \
      #      -H "Content-Type: application/json" \
      #      -H "Authorization: Bearer ${OPENAI_API_KEY}" \
      #      -d ""

      #- name: "Test 2"
      #  continue-on-error: true
      #  run: |
      #    echo two

      # END CUSTOM

      ## Optional Fail Job for Debugging
      - name: "Fail"
        if: ${{ inputs.fail }}
        run: |
          exit 1
