name: "Homebrew"

on:
  workflow_dispatch:
    inputs:
      fail:
        description: "Fail Job"
        type: boolean
        default: false
      version:
        description: "Version to update. Tip: github.ref_name"
        default: "1.0.0"
      url:
        description: "URL to update."
        default: "https://github.com/cssnr/vitepress-plugin-contributors/releases/download/0.0.5/dist.zip"
      repo:
        description: "Repository owner/name of the homebrew tap."
        default: "smashedr/homebrew-test"
      formula:
        description: "Formula file relative to the Formula directory."
        default: "sharex-cli.rb"
      branch:
        description: "Branch to Checkout and Push too."
        default: "master"
      token:
        description: "Fine Grained or Personal Access Token with permissions contents: write"
        default: "1"
  #push:
  #  branches: ["**"]

jobs:
  homebrew:
    name: "Homebrew"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: "Checkout Homebrew"
        uses: actions/checkout@v6
        with:
          path: homebrew-tap
          persist-credentials: false
          ref: ${{ inputs.branch }}
          repository: ${{ inputs.repo }}

      - name: "Debug"
        shell: bash
        run: |
          echo "repo: ${GITHUB_REPOSITORY}" 
          echo "repo name: ${GITHUB_REPOSITORY#*/}" 
          echo "formula: ${GITHUB_REPOSITORY#*/}.rb"

      - name: "Formula File"
        env:
          path: homebrew-tap/Formula
        shell: bash
        run: |
          if [ -n "${{ inputs.formula }}" ];then
            if [ -f "${{ env.path }}/${{ inputs.formula }}" ];then
              echo "formula=${{ env.path }}/${{ inputs.formula }}" >> "$GITHUB_ENV"
            elif [ -f "${{ env.path }}/${{ inputs.formula }}.rb" ];then
              echo "formula=${{ env.path }}/${{ inputs.formula }}.rb" >> "$GITHUB_ENV"
            fi
          else
            echo "formula=${GITHUB_REPOSITORY#*/}.rb" >> "$GITHUB_ENV"
          fi

      - name: "Verify Formula File"
        shell: bash
        run: |
          echo "formula: ${{ env.formula }}"
          if [ ! -f "${{ env.formula }}" ];then
            echo "Not a File: Formula/${{ env.formula }}"
            exit 1
          fi

      - name: "Update Version"
        if: ${{ inputs.version }}
        shell: bash
        run: |
          line=$(grep -n -m1 version "${{ env.formula }}" | cut -f1 -d:)
          echo "line: ${line}"
          sed -i "${line}"'s/.*/  version "${{ inputs.version }}"/' "${{ env.formula }}"

      - name: "Update URL"
        if: ${{ inputs.url }}
        shell: bash
        run: |
          line=$(grep -n -m1 url "${{ env.formula }}" | cut -f1 -d:)
          echo "line: ${line}"
          sed -i "${line}"'s/.*/  url "${{ inputs.url }}"/' "${{ env.formula }}"

      - name: "Debug Formula"
        shell: bash
        run: |
          cat -n "${{ env.formula }}"

      - name: "Commit and Push"
        working-directory: homebrew-tap
        shell: bash
        run: |
          file="$(basename ${{ env.formula }})"
          echo "file: ${file}"
          echo "message: Bump ${file} to ${{ inputs.version }}"
          results="$(git diff -U0 Formula)"
          echo "::group::results"
          echo "${results}"
          echo "::endgroup::"
          md="Version: \`${{ inputs.version }}\`\n"
          md+="Formula: \`Formula/${file}\`\n"
          md+="git diff:\n\`\`\`text\n${results}\n\`\`\`"
          echo -e "${md}" >> "$GITHUB_STEP_SUMMARY"

      #- name: "Commit and Push"
